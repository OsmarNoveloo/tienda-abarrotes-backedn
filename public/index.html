<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda Abarrotes API</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --border: #262b38;
    --text: #e6e9ef;
    --muted: #8b93a7;
    --accent: #6ea8fe;
    --get: #2fae66;
    --post: #4f8ef7;
    --put: #e0a336;
    --patch: #b57bf0;
    --delete: #e6584f;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f5f6f8;
      --panel: #ffffff;
      --border: #e2e5eb;
      --text: #1a1d24;
      --muted: #5b6373;
      --accent: #2563eb;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 2rem 1.25rem 4rem;
  }
  .wrap { max-width: 900px; margin: 0 auto; }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    margin-bottom: 1.5rem;
  }
  h1 { font-size: 1.4rem; margin: 0; }
  .status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
    padding: 0.4rem 0.75rem;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--panel);
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.ok { background: var(--get); box-shadow: 0 0 6px var(--get); }
  .dot.fail { background: var(--delete); box-shadow: 0 0 6px var(--delete); }
  .module {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1rem;
    overflow: hidden;
  }
  .module summary {
    cursor: pointer;
    padding: 0.85rem 1.1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: space-between;
    list-style: none;
  }
  .module summary::-webkit-details-marker { display: none; }
  .module summary .base {
    font-weight: 400;
    color: var(--muted);
    font-size: 0.85rem;
    font-family: ui-monospace, Menlo, Consolas, monospace;
  }
  .endpoint {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 0.75rem;
    align-items: center;
    padding: 0.6rem 1.1rem;
    border-top: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .method {
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 4px;
    text-align: center;
    color: #0b0d12;
  }
  .method.GET { background: var(--get); }
  .method.POST { background: var(--post); }
  .method.PUT { background: var(--put); }
  .method.PATCH { background: var(--patch); }
  .method.DELETE { background: var(--delete); }
  .path { font-family: ui-monospace, Menlo, Consolas, monospace; }
  .desc { color: var(--muted); font-size: 0.82rem; grid-column: 1 / -1; margin-top: -0.35rem; padding-left: calc(64px + 0.75rem); }
  .auth {
    font-size: 0.7rem;
    color: var(--muted);
    white-space: nowrap;
  }
  .auth.public { color: var(--accent); }
  footer { text-align: center; color: var(--muted); font-size: 0.8rem; margin-top: 2rem; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Tienda Abarrotes — API</h1>
    <div class="status"><span class="dot" id="dot"></span><span id="statusText">Comprobando servidor…</span></div>
  </header>

  <div id="modules"></div>

  <footer>Todas las rutas de negocio cuelgan de <code>/api</code>. Ver también <code>GET /health</code>.</footer>
</div>

<script src="/app.js"></script>
</body>
</html>
